<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Predictor</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #25254b);
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #2b2b36;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            color: #00d2ff;
            margin-top: 0;
        }

        p {
            text-align: center;
            color: #a0a0b0;
            margin-bottom: 30px;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #e0e0e0;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #444;
            border-radius: 8px;
            background-color: #1e1e24;
            color: #fff;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            border-color: #00d2ff;
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4);
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            background-color: rgba(0, 210, 255, 0.1);
            border-left: 5px solid #00d2ff;
            border-radius: 5px;
            text-align: center;
        }

        .result-box h2 {
            color: #00d2ff;
            margin: 0;
            font-size: 18px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎮 Game Predict</h1>
        <p>Enter the game details below for a prediction.</p>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Platform:</label>
                <input type="text" name="platform" placeholder="" required>
            </div>

            <div class="form-group">
                <label>Publisher:</label>
                <input type="text" name="publisher" placeholder="" required>
            </div>

            <div class="form-group">
                <label>Genre:</label>
                <input type="text" name="genre" placeholder="" required>
            </div>

            <div class="form-group">
                <label>Year:</label>
                <input type="number" name="year" placeholder="" required>
            </div>

            <button type="submit">Predict Game</button>
        </form>

        {% if prediction %}
            <div class="result-box">
                <h2>{{ prediction }}</h2>
            </div>
        {% endif %}
    </div>

</body>
</html>
